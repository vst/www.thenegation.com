<p
  class="text-ctp-subtext0 text-xs"
  xmlns:cc="http://creativecommons.org/ns#"
  xmlns:dct="http://purl.org/dc/terms/">
  ©
  <a
    href="{{ .Site.Params.tn.author.website }}"
    target="_blank"
    rel="cc:attributionURL dct:creator license noopener noreferrer"
    property="cc:attributionName"
    class="text-nowrap hover:underline"
    >{{ .Site.Params.tn.author.name }}</a
  >
  • Licensed under
  <a
    href="http://creativecommons.org/licenses/by-sa/4.0/?ref=chooser-v1"
    target="_blank"
    rel="license noopener noreferrer"
    class="text-nowrap hover:underline"
    property="dct:title"
    content="{{ .Site.Title | markdownify | plainify | htmlUnescape | strings.TrimSpace }}"
    >CC BY-SA 4.0</a
  >
  (unless otherwise noted).
</p>
