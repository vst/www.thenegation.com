{{- define "main" -}}
  <div class="tn-prose">
    <h1>{{ .Title | markdownify }}</h1>

    {{ .Content }}


    <ul>
      {{- range .Pages.ByTitle -}}
        <li>
          <a href="{{ .RelPermalink }}">{{ .LinkTitle | markdownify }}</a>
          <span class="font-mono text-xs">[{{ len .Pages }}]</span>
        </li>
      {{- end -}}
    </ul>
  </div>
{{- end -}}
