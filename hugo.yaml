# yaml-language-server: $schema=https://www.schemastore.org/hugo.json

title: "The Negation --- @vst's Personal Website"
locale: "en-us"
baseURL: "https://www.thenegation.com"
enableEmoji: true

params:
  tn:
    version: "2.1.0" # x-release-please-version
    description: "Personal Website of Vehbi Sinan Tunalioglu"
    author:
      name: "Vehbi Sinan Tunalioglu"
      website: "https://github.com/vst"

menus:
  main:
    - name: "Home"
      pageRef: "/"
      weight: 10
    - name: "Blog"
      pageRef: "/posts"
      weight: 20
    - name: "About"
      pageRef: "/about"
      weight: 30

taxonomies:
  tag: "tags"

markup:
  highlight:
    anchorLineNos: true
    codeFences: true
    guessSyntax: false
    hl_inline: false
    lineAnchors: ""
    lineNoStart: 1
    lineNos: false
    lineNumbersInTable: false
    noClasses: true
    style: "catppuccin-mocha"
    tabWidth: 4
    wrapperClass: "highlight"

build:
  noJSConfigInAssets: true
  buildStats:
    enable: true
  cachebusters:
    - source: "assets/notwatching/hugo_stats\\.json"
      target: "css"
    - source: "(postcss|tailwind)\\.config\\.js"
      target: "css"

module:
  mounts:
    - source: "assets"
      target: "assets"
    - disableWatch: true
      source: "hugo_stats.json"
      target: "assets/notwatching/hugo_stats.json"
